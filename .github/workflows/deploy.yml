name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "22"
  DEPLOY_PATH: /opt/safe-view

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Run unit & integration tests
        run: pnpm test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build API
        run: pnpm --filter @safe-view/api build

      - name: Build Web
        run: pnpm --filter @safe-view/web build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Configure SSH over Cloudflare Tunnel
        run: |
          printf "Host %s\n  User %s\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n  ProxyCommand cloudflared access ssh --hostname %%h\n" "$VPS_HOST" "$VPS_USER" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          cat ~/.ssh/config
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}

      - name: Deploy files via rsync
        run: |
          rsync -azP --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='apps/api/.env' \
            --exclude='*.db' \
            --exclude='*.db-journal' \
            ./ ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Write API .env
        run: |
          {
            echo 'NODE_ENV="production"'
            echo 'DATABASE_URL="${{ vars.DATABASE_URL }}"'
            echo 'GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}"'
            echo 'GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"'
            echo 'JWT_SECRET="${{ secrets.JWT_SECRET }}"'
            echo 'ALCHEMY_API_KEY="${{ secrets.ALCHEMY_API_KEY }}"'
            echo 'REDIS_URL="${{ secrets.REDIS_URL }}"'
            echo 'FRONTEND_URL="${{ vars.FRONTEND_URL }}"'
            echo 'PORT=${{ vars.PORT }}'
          } | ssh ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} "cat > ${{ env.DEPLOY_PATH }}/apps/api/.env"

      - name: Post-deploy setup
        run: |
          ssh ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} << 'REMOTE'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/share/pnpm:$PATH"

            cd /opt/safe-view

            pnpm install --frozen-lockfile

            cd apps/api && npx prisma generate && npx prisma migrate deploy && cd ../..

            # Ensure Redis is running
            sudo systemctl is-active --quiet redis-server || sudo systemctl start redis-server

            pm2 describe safe-view-api > /dev/null 2>&1 && pm2 restart safe-view-api || pm2 start dist/server.js --name safe-view-api --cwd /opt/safe-view/apps/api
            pm2 save

            sudo cp /opt/safe-view/nginx/safe-view.conf /etc/nginx/sites-available/safe-view
            sudo ln -sf /etc/nginx/sites-available/safe-view /etc/nginx/sites-enabled/safe-view
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx
          REMOTE
