name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  DEPLOY_PATH: /opt/safe-view

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build API
        run: pnpm --filter @safe-view/api build

      - name: Build Web
        run: pnpm --filter @safe-view/web build

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Configure SSH over Cloudflare Tunnel
        run: |
          cat >> ~/.ssh/config << EOF
          Host ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy files via rsync
        run: |
          rsync -azP --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='apps/api/.env' \
            --exclude='apps/api/*.db' \
            --exclude='apps/api/*.db-journal' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Post-deploy setup
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/share/pnpm:$PATH"

            cd /opt/safe-view

            pnpm install --frozen-lockfile --prod

            cd apps/api && npx prisma generate && npx prisma migrate deploy && cd ../..

            pm2 describe safe-view-api > /dev/null 2>&1 && pm2 restart safe-view-api || pm2 start apps/api/dist/server.js --name safe-view-api --cwd /opt/safe-view
            pm2 save
          REMOTE
